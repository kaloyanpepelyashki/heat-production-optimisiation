services:
  am:
    build:
      context: .
      dockerfile: services/am/Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SUPABASE_CONNECTION_STRING=${SUPABASE_CONNECTION_STRING}

  sdm:
    build:
      context: .
      dockerfile: services/sdm/Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SUPABASE_CONNECTION_STRING=${SUPABASE_CONNECTION_STRING}

  opt:
    build:
      context: .
      dockerfile: services/opt/Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AM_API_URL=http://am:8080
      - SDM_API_URL=http://sdm:8080
      - RDM_API_URL=http://rdm:8080

  rdm:
    build:
      context: .
      dockerfile: services/rdm/Dockerfile
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SUPABASE_CONNECTION_STRING=${SUPABASE_CONNECTION_STRING}

  bff:
    build:
      context: .
      dockerfile: services/bff/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AM_API_URL=http://am:8080
      - SDM_API_URL=http://sdm:8080
      - OPT_API_URL=http://opt:8080
      - RDM_API_URL=http://rdm:8080
